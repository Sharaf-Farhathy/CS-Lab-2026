<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
	<style>
		table,tr,th,td {
			border: 1px solid red;
		}
		table {
			width: 30%;
		}
	</style>
</head>
<body>
    <table>
		<tr>
			<th>Name</th>
			<th width="60%">Phone</th>
		</tr>
		<tr>
			<td rowspan="3">sam</td>
			<td>0702454084</td>
		</tr>
		<tr>
			<td>0702454097</td>
		</tr>
		<tr>
			<td>0702454068</td>
		</tr>
	</table>
</body>
</html>
