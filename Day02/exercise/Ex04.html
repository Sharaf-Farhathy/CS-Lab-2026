<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Form</title>
	<style>
		body {
			background-color: rgb(127,191,255);
			padding: 20px;
		}
	</style>
</head>
<body>
    <h2>Registration form</h2>
	
	<form>
		<label for="fname">First Name : </label>
		<input type="text" id="fname" name="fname"><br>
		
		<label for="lname">Last Name : </label>
		<input type="text" id="lname" name="lname"><br>
		
		<label for="password">Password : </label>
		<input type="password" id="password" name="password"><br>
		
		<label>Gender : </label>
		<input type="radio" id="male" name="gender" value="male">
		<label for="male">Male</label>
		<input type="radio" id="female" name="gender" value="female">
		<label for="female">Female</label><br>
		
		<label for="country">Country : </label>
		<select id="country" name="country">
			<option value="">---Select a Country---</option>
			<option value="Sri Lanka">Sri Lanka</option>
			<option value="India">India</option>
			<option value="USA">USA</option>
		</select><br>
		
		<label for="dob">Date Of Birth : </label>
		<input type="date" id="dob" name="dob"><br>
		
		<label>Interests : </label>
		<input type="checkbox" id="tv" name="interests" value="watchingtv">
		<label for="tv">Watching TV</label>
		
		<input type="checkbox" id="cricket" name="interests" value="cricket">
		<label for="cricket">Cricket</label>
		
		<input type="checkbox" id="cooking" name="interests" value="cooking">
		<label for="cooking">Cooking</label><br>
		
		<button type="submit">Submit</button>
	</form>
</body>
</html>
